<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>CodeViper demo — Ollama</title>
    <link rel="stylesheet" href="demo-shell.css" />
    <style>
      .settings {
        padding: 16px 20px;
        overflow: auto;
      }
      .settings h2 {
        font-size: 18px;
        margin-bottom: 12px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .tab {
        padding: 6px 12px;
        border-radius: 6px;
        background: #21262d;
        border: 1px solid #30363d;
        font-size: 12px;
      }
      .tab.active {
        border-color: #58a6ff;
        color: #58a6ff;
      }
      .model-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-radius: 8px;
        background: #21262d;
        border: 1px solid #30363d;
        margin-bottom: 8px;
        font-size: 13px;
        opacity: 0;
        animation: fadeIn 0.35s ease forwards;
      }
      .model-row.delay-1 {
        animation-delay: 0.3s;
      }
      .model-row.delay-2 {
        animation-delay: 0.7s;
      }
      .model-row.delay-3 {
        animation-delay: 1.1s;
      }
      .model-row.active {
        border-color: #238636;
      }
      .tag {
        font-size: 11px;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <div class="shell" style="grid-template-rows: 40px 1fr 0">
      <header class="topbar">
        <span class="pill"><span class="dot"></span> Ollama</span>
        <span class="pill">http://127.0.0.1:11434</span>
        <span style="margin-left: auto; color: #8b949e">Настройки → Модель</span>
      </header>
      <div class="main" style="grid-template-columns: 1fr">
        <section class="settings">
          <h2>Настройки</h2>
          <div class="tabs">
            <span class="tab active">Модель</span>
            <span class="tab">Поведение</span>
            <span class="tab">Интеграции</span>
          </div>
          <p style="font-size: 12px; color: #8b949e; margin-bottom: 12px">
            Провайдер: <strong style="color: #e6edf3">Ollama</strong> · локальные GGUF
          </p>
          <div class="model-row delay-1">
            <div>
              <div>qwen2.5-coder:7b</div>
              <div class="tag">4.7 GB · tool calling</div>
            </div>
            <span style="color: #3fb950">✓</span>
          </div>
          <div class="model-row delay-2 active">
            <div>
              <div>deepseek-r1:8b</div>
              <div class="tag">5.2 GB · reasoning</div>
            </div>
            <span>скачивание 68%</span>
          </div>
          <div class="model-row delay-3">
            <div>
              <div>llama3.1:8b</div>
              <div class="tag">4.9 GB</div>
            </div>
            <button class="meta-btn" type="button">Скачать</button>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
