name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Создаём черновик релиза до старта сборок — все платформы загружают в него
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          RELEASE_ID=$(gh release create "$TAG" \
            --title "CodeViper $TAG" \
            --draft \
            --notes "## Что нового
          ${NOTES}

          ---
          **Установка:** скачайте \`CodeViper-Setup-*.exe\` (Windows), \`.AppImage\` (Linux) или \`.dmg\` (macOS)." \
            --json id --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Cache electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm fakeroot

      - name: Build (electron-vite)
        run: npm run build

      - name: Test launcher on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ../CodeViper.sh
          bash -n ../CodeViper.sh
          echo "✓ CodeViper.sh syntax OK"

      - name: Package and publish to GitHub Releases
        run: npx electron-builder@24 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # Все платформы готовы — снимаем draft
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo rkfsociety/CodeViper \
            --draft=false
