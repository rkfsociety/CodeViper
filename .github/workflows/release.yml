name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Cache electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm fakeroot

      - name: Build (electron-vite)
        run: npm run build

      - name: Test launcher on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ../CodeViper.sh
          # Проверка синтаксиса bash
          bash -n ../CodeViper.sh
          echo "✓ CodeViper.sh syntax OK"

      - name: Package and publish to GitHub Releases
        run: npx electron-builder@24 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Пропустить code signing macOS — артефакт публикуется без подписи
          CSC_IDENTITY_AUTO_DISCOVERY: false
