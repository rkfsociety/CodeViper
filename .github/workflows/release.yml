name: Release

on:
  push:
    tags:
      - 'v*'
  # Тег через GITHUB_TOKEN в CI не запускает push-триггер — вызываем вручную из auto-shell-release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег релиза (например v0.3.5); пусто — github.ref_name'
        required: false
        type: string

permissions:
  contents: write

# Не гонять два релиза параллельно (гонка electron-builder за один GitHub Release).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Создаём черновик релиза до старта сборок — все платформы загружают в него
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            ACTUAL=$(gh release view "$TAG" --json tagName -q .tagName)
            if [ "$ACTUAL" != "$TAG" ]; then
              echo "❌ Release $TAG привязан к неверному тегу: $ACTUAL"
              exit 1
            fi
            echo "Release $TAG уже существует — повторное создание пропущено"
            exit 0
          fi
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          TITLE=$(node scripts/generate-release-notes.mjs --tag "$TAG" --prev-tag "$PREV_TAG" --title-only)
          NOTES=$(node scripts/generate-release-notes.mjs --tag "$TAG" --prev-tag "$PREV_TAG")
          gh release create "$TAG" \
            --title "$TITLE" \
            --draft \
            --notes "$NOTES"
          ACTUAL=$(gh release view "$TAG" --json tagName -q .tagName)
          if [ "$ACTUAL" != "$TAG" ]; then
            echo "❌ gh release create не привязал тег $TAG (получен: ${ACTUAL:-untagged})"
            exit 1
          fi
          echo "✓ Draft release $TAG создан"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Sync package version from tag
        working-directory: app
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node -e "const fs=require('fs');const v=process.env.RELEASE_TAG.replace(/^v/,'');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=v;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"

      - name: Cache electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm fakeroot

      - name: Build (electron-vite)
        run: npm run build

      - name: Test launcher on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ../CodeViper.sh
          bash -n ../CodeViper.sh
          echo "✓ CodeViper.sh syntax OK"

      - name: Package and publish to GitHub Releases
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # Все платформы готовы — снимаем draft
  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          ASSETS=$(gh release view "$TAG" --repo rkfsociety/CodeViper --json assets -q '.assets[].name')
          echo "$ASSETS"
          echo "$ASSETS" | grep -q 'latest\.yml' || {
            echo "❌ Нет latest.yml (Windows) — не публикуем релиз"
            exit 1
          }
          echo "$ASSETS" | grep -q 'CodeViper-Setup-' || {
            echo "❌ Нет CodeViper-Setup-*.exe — не публикуем релиз"
            exit 1
          }
          gh release edit "$TAG" \
            --repo rkfsociety/CodeViper \
            --draft=false

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          node scripts/prune-github-releases.mjs --tag-pattern '^nightly-' --keep 0
          node scripts/prune-github-releases.mjs \
            --tag-pattern '^v[0-9]' \
            --keep 0 \
            --exclude "$TAG"
