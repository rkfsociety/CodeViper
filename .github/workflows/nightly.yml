name: Nightly Release

on:
  schedule:
    - cron: '0 0 * * *' # каждый день в 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute tag name
        id: tag
        run: echo "tag=nightly-$(date -u '+%Y.%m.%d')" >> "$GITHUB_OUTPUT"

      - name: Delete previous nightly releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName \
            | jq -r '.[] | select(.tagName | startswith("nightly-")) | .tagName' \
            | while read old_tag; do
                echo "Удаляем: $old_tag"
                gh release delete "$old_tag" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
              done

      - name: Create and push nightly tag
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Create draft nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          SHA="$(git rev-parse --short HEAD)"
          NOTES=$(git log -10 --pretty=format:"- %s" --no-merges)
          gh release create "$TAG" \
            --title "CodeViper Nightly ${TAG#nightly-}" \
            --draft \
            --prerelease \
            --notes "## Nightly-сборка

          **Дата:** ${DATE} · **коммит** [\`${SHA}\`](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))

          Предрелиз для канала **Beta** в настройках приложения. Не для продакшена — только тестирование свежего \`master\`.

          ### Последние коммиты
          ${NOTES}

          ---
          | Платформа | Файл |
          |-----------|------|
          | Windows | \`CodeViper-Setup-*.exe\` |
          | Linux | \`CodeViper-*.AppImage\` |
          | macOS | \`CodeViper-*.dmg\` |"

  release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Cache electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm fakeroot

      - name: Set nightly version for electron-builder
        run: node ../scripts/set-nightly-package-version.mjs
        env:
          NIGHTLY_TAG: ${{ needs.prepare.outputs.tag }}

      - name: Build (electron-vite)
        run: npm run build

      - name: Test launcher on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ../CodeViper.sh
          bash -n ../CodeViper.sh
          echo "✓ CodeViper.sh syntax OK"

      - name: Package and upload to nightly release
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VER="${TAG#nightly-}"
          npx electron-builder@24 --publish never
          gh release upload "$TAG" "release/${VER}/"* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --draft=false \
            --prerelease
